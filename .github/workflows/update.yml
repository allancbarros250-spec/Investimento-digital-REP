name: Atualizar Ativos

on:
  schedule:
    - cron: "*/15 10-18 * * 1-5"

  workflow_dispatch:

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências
        run: npm install

      - name: Rodar atualização
        run: node updateativos.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          